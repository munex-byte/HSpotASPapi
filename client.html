<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H+ Sport - Product Catalog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls select,
        .controls input,
        .controls button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .controls select {
            min-width: 200px;
            background: white;
            cursor: pointer;
        }

        .controls input {
            flex: 1;
            min-width: 200px;
        }

        .controls button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #764ba2;
        }

        .controls button.danger {
            background: #e74c3c;
        }

        .controls button.danger:hover {
            background: #c0392b;
        }

        .controls button.success {
            background: #27ae60;
        }

        .controls button.success:hover {
            background: #229954;
        }

        .main-content {
            padding: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            background: white;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .product-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .product-sku {
            color: #667eea;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #27ae60;
        }

        .product-category {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .product-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-left: 5px;
        }

        .product-status.available {
            background: #d4edda;
            color: #155724;
        }

        .product-status.unavailable {
            background: #f8d7da;
            color: #721c24;
        }

        .product-description {
            color: #666;
            font-size: 0.95rem;
            margin: 10px 0;
            line-height: 1.4;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .product-actions button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background 0.3s;
        }

        .product-actions button.edit {
            background: #667eea;
            color: white;
        }

        .product-actions button.edit:hover {
            background: #5568d3;
        }

        .product-actions button.delete {
            background: #e74c3c;
            color: white;
        }

        .product-actions button.delete:hover {
            background: #c0392b;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #333;
        }

        .close {
            font-size: 2rem;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            background: none;
            border: none;
        }

        .close:hover,
        .close:focus {
            color: #000;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .form-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }

        .form-actions button.submit {
            background: #27ae60;
            color: white;
        }

        .form-actions button.submit:hover {
            background: #229954;
        }

        .form-actions button.cancel {
            background: #95a5a6;
            color: white;
        }

        .form-actions button.cancel:hover {
            background: #7f8c8d;
        }

        .message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty h3 {
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏋️ H+ Sport</h1>
            <p>Product Catalog Manager</p>
        </header>

        <div class="controls">
            <select id="categoryFilter">
                <option value="">All Categories</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search products by name or SKU...">
            <button onclick="addNewProduct()">+ Add Product</button>
        </div>

        <div class="main-content">
            <div id="message" class="message"></div>

            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalProducts">0</h3>
                    <p>Total Products</p>
                </div>
                <div class="stat-card">
                    <h3 id="availableProducts">0</h3>
                    <p>Available</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalCategories">0</h3>
                    <p>Categories</p>
                </div>
            </div>

            <div id="productsContainer" class="products-grid">
                <div class="loading">Loading products...</div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Product</h2>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label for="productName">Product Name *</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label for="productSku">SKU *</label>
                    <input type="text" id="productSku" required>
                </div>
                <div class="form-group">
                    <label for="productCategory">Category *</label>
                    <select id="productCategory" required></select>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price *</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="productAvailable" checked>
                        Available for Sale
                    </label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="submit">Save Product</button>
                    <button type="button" class="cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5233/api';
        let currentEditingId = null;
        let allProducts = [];
        let allCategories = [];

        // Initialize the application
        async function init() {
            await loadCategories();
            await loadProducts();
            setupEventListeners();
        }

        // Setup event listeners for search and filter
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterProducts);
            document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        }

        // Load categories from API
        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE_URL}/products`);
                const products = await response.json();
                
                // Extract unique categories from products
                const categoryMap = {};
                products.forEach(product => {
                    if (product.category && product.category.name) {
                        categoryMap[product.category.id] = product.category.name;
                    }
                });

                allCategories = Object.entries(categoryMap).map(([id, name]) => ({
                    id: parseInt(id),
                    name: name
                }));

                populateCategorySelects();
                document.getElementById('totalCategories').textContent = allCategories.length;
            } catch (error) {
                console.error('Error loading categories:', error);
                showMessage('Error loading categories', 'error');
            }
        }

        // Populate category select dropdowns
        function populateCategorySelects() {
            const filterSelect = document.getElementById('categoryFilter');
            const formSelect = document.getElementById('productCategory');

            // Clear existing options (except the first "All Categories")
            while (filterSelect.options.length > 1) {
                filterSelect.remove(1);
            }
            while (formSelect.options.length > 0) {
                formSelect.remove(0);
            }

            // Add categories
            allCategories.forEach(category => {
                const option1 = document.createElement('option');
                option1.value = category.id;
                option1.textContent = category.name;
                filterSelect.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = category.id;
                option2.textContent = category.name;
                formSelect.appendChild(option2);
            });
        }

        // Load products from API
        async function loadProducts() {
            try {
                const container = document.getElementById('productsContainer');
                container.innerHTML = '<div class="loading">Loading products...</div>';

                const response = await fetch(`${API_BASE_URL}/products`);
                if (!response.ok) throw new Error('Failed to load products');

                allProducts = await response.json();
                updateStats();
                displayProducts(allProducts);
            } catch (error) {
                console.error('Error loading products:', error);
                showMessage('Error loading products from API', 'error');
                document.getElementById('productsContainer').innerHTML = 
                    '<div class="empty"><h3>Unable to load products</h3><p>Make sure the API is running at ' + API_BASE_URL + '</p></div>';
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalProducts').textContent = allProducts.length;
            const available = allProducts.filter(p => p.isAvailable).length;
            document.getElementById('availableProducts').textContent = available;
        }

        // Display products in the grid
        function displayProducts(products) {
            const container = document.getElementById('productsContainer');

            if (products.length === 0) {
                container.innerHTML = '<div class="empty"><h3>No products found</h3><p>Try adjusting your search or filters</p></div>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-header">
                        <div>
                            <div class="product-name">${escapeHtml(product.name)}</div>
                            <div class="product-sku">${escapeHtml(product.sku)}</div>
                        </div>
                    </div>
                    <div class="product-category">${escapeHtml(product.category?.name || 'N/A')}</div>
                    <div class="product-status ${product.isAvailable ? 'available' : 'unavailable'}">
                        ${product.isAvailable ? '✓ Available' : '✗ Unavailable'}
                    </div>
                    <div class="product-price">$${parseFloat(product.price).toFixed(2)}</div>
                    <div class="product-description">${product.description || 'No description available'}</div>
                    <div class="product-actions">
                        <button class="edit" onclick="editProduct(${product.id})">Edit</button>
                        <button class="delete" onclick="deleteProduct(${product.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Filter products based on search and category
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryId = document.getElementById('categoryFilter').value;

            const filtered = allProducts.filter(product => {
                const matchesSearch = !searchTerm || 
                    product.name.toLowerCase().includes(searchTerm) ||
                    product.sku.toLowerCase().includes(searchTerm);
                const matchesCategory = !categoryId || product.categoryId == categoryId;
                return matchesSearch && matchesCategory;
            });

            displayProducts(filtered);
        }

        // Open modal for adding new product
        function addNewProduct() {
            currentEditingId = null;
            document.getElementById('modalTitle').textContent = 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').style.display = 'block';
        }

        // Open modal for editing a product
        async function editProduct(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/products/${id}`);
                if (!response.ok) throw new Error('Failed to load product');

                const product = await response.json();
                currentEditingId = id;

                document.getElementById('modalTitle').textContent = 'Edit Product';
                document.getElementById('productName').value = product.name;
                document.getElementById('productSku').value = product.sku;
                document.getElementById('productCategory').value = product.categoryId;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productAvailable').checked = product.isAvailable;

                document.getElementById('productModal').style.display = 'block';
            } catch (error) {
                console.error('Error loading product:', error);
                showMessage('Error loading product details', 'error');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            currentEditingId = null;
            document.getElementById('productForm').reset();
        }

        // Save product (add or edit)
        async function saveProduct(event) {
            event.preventDefault();

            const product = {
                name: document.getElementById('productName').value,
                sku: document.getElementById('productSku').value,
                categoryId: parseInt(document.getElementById('productCategory').value),
                price: parseFloat(document.getElementById('productPrice').value),
                description: document.getElementById('productDescription').value,
                isAvailable: document.getElementById('productAvailable').checked
            };

            try {
                if (currentEditingId) {
                    // Update existing product
                    const response = await fetch(`${API_BASE_URL}/products/${currentEditingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...product, id: currentEditingId })
                    });
                    if (!response.ok) throw new Error('Failed to update product');
                    showMessage('Product updated successfully!', 'success');
                } else {
                    // Add new product
                    const response = await fetch(`${API_BASE_URL}/products`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(product)
                    });
                    if (!response.ok) throw new Error('Failed to add product');
                    showMessage('Product added successfully!', 'success');
                }

                closeModal();
                await loadProducts();
            } catch (error) {
                console.error('Error saving product:', error);
                showMessage('Error saving product: ' + error.message, 'error');
            }
        }

        // Delete product
        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/products/${id}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error('Failed to delete product');

                showMessage('Product deleted successfully!', 'success');
                await loadProducts();
            } catch (error) {
                console.error('Error deleting product:', error);
                showMessage('Error deleting product: ' + error.message, 'error');
            }
        }

        // Show message notification
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            
            setTimeout(() => {
                messageEl.className = 'message';
            }, 4000);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Close modal when clicking outside of it
        window.onclick = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
